name: Test

# Triggers the workflow on push or pull request events for the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: App (yarn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  functions:
    name: Functions (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm install

      - name: Build
        working-directory: functions
        run: npm run build

      # Only run tests if a test script exists (the functions-tests issue may
      # not have landed yet). npm exits non-zero on a missing script, so guard it.
      - name: Test
        working-directory: functions
        run: |
          if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No functions test script defined; skipping."
          fi
