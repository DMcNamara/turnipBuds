name: Test

# Triggers on push/PR to main and to the Phase 4 Expo-upgrade integration branch,
# so the module-by-module port gets CI before it merges to main.
on:
  push:
    branches: [main, phase-4/expo-latest]
  pull_request:
    branches: [main, phase-4/expo-latest]

jobs:
  app:
    name: App (yarn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  functions:
    name: Functions (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # The functions package targets the Node 22 runtime (see
          # functions/package.json engines). The repo-wide .nvmrc stays on the
          # Expo/frontend Node version, so pin this job explicitly.
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Unit tests
        working-directory: functions
        run: npm test

      # Integration tests run the compiled triggers against the Firestore
      # emulator, started via firebase-tools (a functions devDependency). The
      # emulator config lives in the repo-root firebase.json, so run from the
      # repo root; a demo-* project id keeps it fully offline (no credentials).
      - name: Integration tests (Firestore emulator)
        run: >
          functions/node_modules/.bin/firebase emulators:exec
          --only firestore --project demo-turnipbuds
          "cd functions && npm run test:integration"
