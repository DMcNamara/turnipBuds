name: Test

# Triggers the workflow on push or pull request events for the master branch
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  app:
    name: App (yarn test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # The app is still Expo 37 / React 16.9, so this job runs on the
          # frontend Node pinned in the repo-root .nvmrc (14.x). The runtime
          # move to a newer Node belongs to a later phase. This job now
          # installs cleanly because the Firebase JS SDK is on v9 (gRPC-Web,
          # no native grpc addon) — that was the only thing that couldn't
          # build on modern toolchains and previously broke the install.
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  functions:
    name: Functions (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm install

      - name: Build
        working-directory: functions
        run: npm run build

      # Only run tests if a test script exists (the functions-tests issue may
      # not have landed yet). npm exits non-zero on a missing script, so guard it.
      - name: Test
        working-directory: functions
        run: |
          if node -e "process.exit(require('./package.json').scripts && require('./package.json').scripts.test ? 0 : 1)"; then
            npm test
          else
            echo "No functions test script defined; skipping."
          fi
